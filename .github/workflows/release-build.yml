name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Protocol Buffers compiler
      uses: arduino/setup-protoc@v3
      with:
        version: '33.x'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Install Rust targets
      run: |
        rustup target add aarch64-linux-android
        rustup target add x86_64-linux-android

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@main
      with:
        ndk-version: r26d
        add-to-path: true
        link-to-sdk: true

    - name: Set NDK environment variables
      run: |
        echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
        echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache Cargo build (release)
      uses: actions/cache@v5
      with:
        path: |
          app/src/main/rust/target
        key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-release-

    - name: Clean Rust incremental builds
      run: |
        find app/src/main/rust -type d -name incremental -exec rm -rf {} + 2>/dev/null || true
        find app/src/main/rust/target -name "*.rlib" -mtime +7 -delete 2>/dev/null || true

    - name: Generate temporary release keystore
      run: |
        keytool -genkeypair -v \
          -keystore "$RUNNER_TEMP/release.keystore" \
          -storepass android \
          -keypass android \
          -alias fork_release \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Fork Release,O=Fork,C=US"

        echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
        echo "RELEASE_KEYSTORE_PASSWORD=android" >> "$GITHUB_ENV"
        echo "RELEASE_KEY_ALIAS=fork_release" >> "$GITHUB_ENV"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
